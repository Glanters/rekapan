# ============================================================================
# nginx reverse proxy — Monthly & Turnover (rekapan.site)
#
# The app is a single Next.js server (UI + API) listening on 127.0.0.1:7564.
# nginx terminates TLS and forwards every request to it. Full setup, certbot,
# and systemd steps are in ../README.md.
#
# Install:
#   sudo cp rekapan.site.conf /etc/nginx/sites-available/rekapan.site.conf
#   sudo ln -s /etc/nginx/sites-available/rekapan.site.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================================

# WebSocket upgrade plumbing. Valid at the http{} context — files under
# sites-enabled are included there. Harmless for plain HTTP requests.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream rekapan_app {
    server 127.0.0.1:7564;
    keepalive 32;
}

# ── HTTP :80 — ACME challenge, otherwise redirect to HTTPS ──────────────────
server {
    listen 80;
    listen [::]:80;
    server_name rekapan.site www.rekapan.site;

    # Let's Encrypt HTTP-01 challenge (certbot --webroot -w /var/www/certbot).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 — reverse proxy to the app ───────────────────────────────────
server {
    server_name rekapan.site www.rekapan.site;

    # `listen ... http2` (not the newer `http2 on;`) so this works on both old
    # and current nginx — 1.25.1+ merely warns it is deprecated, older versions
    # require it, and `http2 on;` is an "unknown directive" error before 1.25.1.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # TLS certificates — obtain with certbot first (see README).
    ssl_certificate     /etc/letsencrypt/live/rekapan.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rekapan.site/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Uploads: gallery images and Excel imports. Raise if you allow bigger files.
    client_max_body_size 50m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    location / {
        proxy_pass http://rekapan_app;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;

        # ── Client address propagation — SECURITY-CRITICAL ─────────────────
        # The app's IP allowlist (Admin → Pembatasan IP) trusts the LEFTMOST
        # value of X-Forwarded-For. We overwrite the header with the real peer
        # address ($remote_addr) rather than appending to it, so a client cannot
        # smuggle a forged, allow-listed IP in front of their own and bypass the
        # gate.
        #
        # If nginx sits BEHIND another proxy/CDN (e.g. Cloudflare), $remote_addr
        # is the CDN, not the visitor — then remove the X-Forwarded-For line
        # below and trust the CDN with the real_ip module instead (see README).
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Streamed responses (Excel export, ZIP downloads): don't buffer, and
        # allow time for large ones to finish.
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }
}
