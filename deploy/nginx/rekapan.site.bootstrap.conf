# ============================================================================
# BOOTSTRAP nginx config — HTTP only, for the FIRST certificate issuance.
#
# The main config (rekapan.site.conf) has an HTTPS block that references
# certificates which do not exist until certbot has run — so `nginx -t` fails if
# you enable it first. Enable THIS instead, obtain the certificate, then switch
# to the main config. See ../README.md.
#
#   sudo cp rekapan.site.bootstrap.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/rekapan.site.bootstrap.conf /etc/nginx/sites-enabled/
#   sudo mkdir -p /var/www/certbot
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot certonly --webroot -w /var/www/certbot -d rekapan.site -d www.rekapan.site
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name rekapan.site www.rekapan.site;

    # Serve the Let's Encrypt HTTP-01 challenge from the webroot.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Nothing else is served during bootstrap.
    location / {
        return 404;
    }
}
