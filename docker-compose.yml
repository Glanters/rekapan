# Local development stack.
#
# Production uses managed equivalents (RDS/Cloud SQL, ElastiCache, Cloudflare R2);
# only the connection strings change, because the application talks to MinIO
# through the S3 API it would use against R2 or S3 anyway.
#
#   docker compose up -d
#   npm run db:migrate && npm run db:seed

name: monthly-turnover

services:
  postgres:
    image: postgres:17-alpine
    container_name: mt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: monthly
      POSTGRES_PASSWORD: monthly_dev_password
      POSTGRES_DB: monthly
      # Deterministic collation: without this the image inherits the host
      # locale, and index ordering then differs between developer machines.
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=C'
    ports:
      # Host port 5433, not 5432. A natively installed PostgreSQL commonly holds
      # 5432 on Windows, and because it binds IPv4 while Docker binds IPv6, both
      # can appear to start cleanly — then `localhost` resolves to the native
      # instance and the app fails to authenticate against a database that does
      # not have its user. Using a distinct port removes the ambiguity.
      # Container-to-container traffic still uses 5432 via the service name.
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command:
      # Development-scale tuning. These are deliberately modest; production
      # values belong in the managed instance's parameter group.
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - random_page_cost=1.1
      # Surface slow queries during development instead of discovering them in
      # production once the EAV tables have grown.
      - -c
      - log_min_duration_statement=500
      - -c
      - max_connections=200
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U monthly -d monthly']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mt-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    # BullMQ requires keyspace eviction to be off: dropping a queued job under
    # memory pressure would silently lose a user's export or ZIP archive.
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: mt-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web console
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: creates the bucket and opens read access on the public prefix so
  # CDN URLs resolve in development the way they will behind R2 in production.
  minio-init:
    image: minio/mc:latest
    container_name: mt-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/monthly-assets;
      mc anonymous set download local/monthly-assets/public;
      echo 'MinIO bucket ready';
      "

  # Prisma CLI runner.
  #
  # Why this exists: Windows Smart App Control refuses to execute Prisma's
  # schema-engine binary, which ships unsigned. That blocks migrate, deploy, and
  # db push on the host. Running the CLI here uses the Linux engine instead and
  # leaves the host's security posture untouched.
  #
  # `node_modules` is a named volume rather than a bind mount: the host's copy
  # holds Windows-native binaries (sharp, swc, the Prisma engines) that cannot
  # run under Linux. The container keeps its own, and it persists between runs
  # so `npm install` is paid once.
  #
  # The generated Prisma client IS written back to the host, which is safe —
  # under driver adapters the client is plain TypeScript with no native binary.
  prisma:
    # Full bookworm, not -slim: the slim image ships without OpenSSL, and Prisma
    # then warns that it cannot detect a libssl version and falls back to
    # openssl-1.1.x. It happens to work, but "may not work as expected" is not a
    # foundation to run migrations on.
    image: node:22-bookworm
    container_name: mt-prisma
    profiles: ['tools']
    working_dir: /app
    env_file: .env
    environment:
      # Overrides the host value: inside the compose network Postgres answers to
      # its service name, not localhost.
      DATABASE_URL: postgresql://monthly:monthly_dev_password@postgres:5432/monthly?schema=public
      # Git hooks are a host concern; installing them here fails without git.
      HUSKY: '0'
    volumes:
      - .:/app
      - prisma-node-modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  minio-data:
  prisma-node-modules:
